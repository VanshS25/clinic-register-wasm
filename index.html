<!DOCTYPE html>
<html>
<head>
<title>Clinic Analyzer</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: radial-gradient(circle, #020617, #000);
    color: #00ffcc;
}

/* Header */
.header {
    margin: 20px auto;
    max-width: 900px;
    padding: 15px;
    border-radius: 12px;
    background: #020617;
    box-shadow: 0 0 15px #00ffcc33;
    display: flex;
    justify-content: space-between;
}

.status {
    color: #22c55e;
}

/* Container */
.container {
    max-width: 900px;
    margin: auto;
}

/* Terminal */
.terminal {
    background: #020617;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 0 20px #00ffcc22;
}

/* Output */
#output {
    min-height: 300px;
    white-space: pre-line;
    margin-bottom: 10px;
}

/* Input area */
.input-box {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    background: #000;
    border: none;
    color: #00ffcc;
    padding: 10px;
    border-radius: 8px;
    outline: none;
}

button {
    background: #00ffcc;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

/* Quick buttons */
.quick {
    margin-top: 10px;
}

.quick button {
    margin: 5px;
    background: #00ffcc22;
    color: #00ffcc;
}

.quick button:hover {
    background: #00ffcc;
    color: black;
}
</style>

</head>

<body>

<div class="header">
    <div>🏥 Clinic Analyzer</div>
    <div class="status">● WASM Live</div>
</div>

<div class="container">

<div class="terminal">

<div id="output">
[+] Clinic System Ready

Commands:
register
visit
history
edit
delete
</div>

<div class="input-box">
<input id="cmd" placeholder="Type command..." onkeydown="handleEnter(event)">
<button onclick="send()">Send</button>
</div>

<div class="quick">
<button onclick="quick('register')">Register</button>
<button onclick="quick('visit')">Visit</button>
<button onclick="quick('history')">History</button>
<button onclick="quick('edit')">Edit</button>
<button onclick="quick('delete')">Delete</button>
</div>

</div>

</div>

<!-- WASM FIX -->
<script>
var ready = false;

var Module = {
    locateFile: function(path) {
        if (path.endsWith(".wasm")) return "clinic.wasm";
        return path;
    },
    onRuntimeInitialized: function() {
        ready = true;
        print("✅ WASM Loaded");
    }
};
</script>

<script src="clinic.js"></script>

<script>

function print(text) {
    output.innerText += "\n" + text;
}

function handleEnter(e) {
    if (e.key === "Enter") send();
}

function send() {
    let input = cmd.value;
    cmd.value = "";
    processInput(input);
}

function quick(x) {
    cmd.value = x;
    cmd.focus();
}

// STATE
let state = "";
let temp = {};

function processInput(input) {

    if (!ready) {
        print("⚠️ System not ready");
        return;
    }

    // REGISTER FLOW
    if (state === "reg_id") {
        temp.id = input;
        print("Enter Name:");
        state = "reg_name"; return;
    }
    if (state === "reg_name") {
        temp.name = input;
        print("Enter Age:");
        state = "reg_age"; return;
    }
    if (state === "reg_age") {
        temp.age = input;
        print("Enter Phone:");
        state = "reg_phone"; return;
    }
    if (state === "reg_phone") {
        temp.phone = input;
        print(Module.ccall("register_patient","string",
        ["number","string","number","string"],
        [temp.id,temp.name,temp.age,temp.phone]));
        state=""; return;
    }

    // COMMANDS
    switch(input.toLowerCase()) {
        case "register":
            print("> register\nEnter ID:");
            state="reg_id";
            break;

        case "history":
            print("Enter ID:");
            state="history";
            break;

        default:
            if(state==="history"){
                print(Module.ccall("get_history","string",
                ["number"],[input]));
                state="";
            }
            else{
                print("❌ Unknown command");
            }
    }
}

</script>

</body>
</html>
