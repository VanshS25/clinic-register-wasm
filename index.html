<!DOCTYPE html>
<html>
<head>
<title>Clinic Terminal</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: #020617;
    color: #00ffcc;
}

/* Container */
.container {
    max-width: 900px;
    margin: 40px auto;
}

/* Terminal */
.terminal {
    background: #020617;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 0 20px #00ffcc33;
}

/* Output */
#output {
    min-height: 300px;
    max-height: 350px;
    overflow-y: auto;
    white-space: pre-line;
}

/* Input */
.input-box {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

input {
    flex: 1;
    background: black;
    border: none;
    color: #00ffcc;
    padding: 10px;
    border-radius: 8px;
    outline: none;
}

button {
    background: #00ffcc;
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="terminal">

<div id="output">
[+] Clinic System Ready
Type: register, history, delete
</div>

<div class="input-box">
<input id="cmd" placeholder="Type command..." onkeydown="handleKey(event)">
<button onclick="send()">Send</button>
</div>

</div>

</div>

<!-- 🔥 WASM FIX -->
<script>
let ready = false;

var Module = {
    locateFile: function(path) {
        if (path.endsWith(".wasm")) return "clinic.wasm";
        return path;
    },
    onRuntimeInitialized: function() {
        ready = true;
        print("✅ System Ready");
    }
};
</script>

<script src="clinic.js"></script>

<script>

const cmd = document.getElementById("cmd");
const output = document.getElementById("output");

function print(text) {
    output.innerText += "\n" + text;
    output.scrollTop = output.scrollHeight;
}

function send() {
    let input = cmd.value.trim();
    if (!input) return;

    cmd.value = "";
    process(input);
}

function handleKey(e) {
    if (e.key === "Enter") send();
}

// STATE SYSTEM
let state = "";
let temp = {};

function process(input) {

    if (!ready) {
        print("⚠️ WASM not ready");
        return;
    }

    print("> " + input);

    // -------- REGISTER --------
    if (input === "register") {
        print("Enter ID:");
        state = "id";
        return;
    }

    if (state === "id") {
        temp.id = input;
        print("Enter Name:");
        state = "name";
        return;
    }

    if (state === "name") {
        temp.name = input;
        print("Enter Age:");
        state = "age";
        return;
    }

    if (state === "age") {
        temp.age = input;
        print("Enter Phone:");
        state = "phone";
        return;
    }

    if (state === "phone") {
        temp.phone = input;

        let res = Module.ccall("register_patient","string",
        ["number","string","number","string"],
        [temp.id,temp.name,temp.age,temp.phone]);

        print(res);
        state = "";
        return;
    }

    // -------- HISTORY --------
    if (input === "history") {
        print("Enter ID:");
        state = "history";
        return;
    }

    if (state === "history") {
        let res = Module.ccall("get_history","string",
        ["number"],[input]);
        print(res);
        state = "";
        return;
    }

    // -------- DELETE --------
    if (input === "delete") {
        print("Enter ID:");
        state = "delete";
        return;
    }

    if (state === "delete") {
        let res = Module.ccall("delete_patient","string",
        ["number"],[input]);
        print(res);
        state = "";
        return;
    }

    print("❌ Unknown command");
}

</script>

</body>
</html>
