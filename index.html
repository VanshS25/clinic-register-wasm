<!DOCTYPE html>
<html>
<head>
<title>Clinic Terminal</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: radial-gradient(circle, #020617, #000);
    color: #00ff9f;
}

/* Container */
.container {
    max-width: 900px;
    margin: 40px auto;
}

/* Title */
.title {
    font-size: 28px;
    text-align: center;
    margin-bottom: 20px;
}

/* Terminal */
.terminal {
    background: #020617;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 0 20px #00ff9f33;
}

/* Output */
#output {
    min-height: 300px;
    white-space: pre-line;
    margin-bottom: 10px;
}

/* Input */
.input-line {
    display: flex;
}

.input-line span {
    margin-right: 5px;
}

input {
    flex: 1;
    background: transparent;
    border: none;
    color: #00ff9f;
    outline: none;
}

/* Buttons */
.commands {
    margin-top: 15px;
}

button {
    margin: 5px;
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    background: #00ff9f22;
    color: #00ff9f;
    cursor: pointer;
}

button:hover {
    background: #00ff9f;
    color: black;
}
</style>

</head>

<body>

<div class="container">

<div class="title">🏥 Clinic Terminal</div>

<div class="terminal">

<div id="output">
Welcome to Clinic System

Commands:
register
visit
history
edit
delete
</div>

<div class="input-line">
<span>></span>
<input id="cmd" placeholder="Type command..." onkeydown="handleEnter(event)">
</div>

<div class="commands">
<button onclick="quick('register')">Register</button>
<button onclick="quick('visit')">Visit</button>
<button onclick="quick('history')">History</button>
<button onclick="quick('edit')">Edit</button>
<button onclick="quick('delete')">Delete</button>
</div>

</div>

</div>

<!-- 🔥 FIXED WASM LOADING -->
<script>
var ready = false;

var Module = {
    locateFile: function(path) {
        if (path.endsWith(".wasm")) return "clinic.wasm";
        return path;
    },
    onRuntimeInitialized: function() {
        ready = true;
        print("✅ System Ready");
    }
};
</script>

<script src="clinic.js"></script>

<script>

// Print function
function print(text) {
    document.getElementById("output").innerText += "\n" + text;
}

// Quick button
function quick(cmdName) {
    document.getElementById("cmd").value = cmdName;
}

// Enter key
function handleEnter(e) {
    if (e.key === "Enter") {
        processInput(cmd.value);
        cmd.value = "";
    }
}

// State machine
let state = "";
let temp = {};

function processInput(input) {

    if (!ready) {
        print("⚠️ System not ready");
        return;
    }

    // -------- REGISTER --------
    if (state === "reg_id") {
        temp.id = input;
        print("Enter Name:");
        state = "reg_name";
        return;
    }

    if (state === "reg_name") {
        temp.name = input;
        print("Enter Age:");
        state = "reg_age";
        return;
    }

    if (state === "reg_age") {
        temp.age = input;
        print("Enter Phone:");
        state = "reg_phone";
        return;
    }

    if (state === "reg_phone") {
        temp.phone = input;

        let res = Module.ccall("register_patient","string",
        ["number","string","number","string"],
        [temp.id, temp.name, temp.age, temp.phone]);

        print(res);
        state = "";
        return;
    }

    // -------- VISIT --------
    if (state === "visit_id") {
        temp.id = input;
        print("Enter Date:");
        state = "visit_date";
        return;
    }

    if (state === "visit_date") {
        temp.date = input;
        print("Enter Diagnosis:");
        state = "visit_diag";
        return;
    }

    if (state === "visit_diag") {
        temp.diag = input;
        print("Enter Prescription:");
        state = "visit_pres";
        return;
    }

    if (state === "visit_pres") {
        temp.pres = input;

        let res = Module.ccall("add_visit","string",
        ["number","string","string","string"],
        [temp.id, temp.date, temp.diag, temp.pres]);

        print(res);
        state = "";
        return;
    }

    // -------- EDIT --------
    if (state === "edit_id") {
        temp.id = input;
        print("Enter Name (or press Enter to skip):");
        state = "edit_name";
        return;
    }

    if (state === "edit_name") {
        temp.name = input;
        print("Enter Age (or press Enter to skip):");
        state = "edit_age";
        return;
    }

    if (state === "edit_age") {
        temp.age = input ? parseInt(input) : 0;
        print("Enter Phone (or press Enter to skip):");
        state = "edit_phone";
        return;
    }

    if (state === "edit_phone") {
        temp.phone = input;

        let res = Module.ccall("edit_patient","string",
        ["number","string","number","string"],
        [temp.id, temp.name || "", temp.age, temp.phone || ""]);

        print(res);
        state = "";
        return;
    }

    // -------- COMMANDS --------
    switch(input.toLowerCase()) {

        case "register":
            print("Enter ID:");
            state = "reg_id";
            break;

        case "visit":
            print("Enter Patient ID:");
            state = "visit_id";
            break;

        case "history":
            print("Enter ID:");
            state = "history";
            break;

        case "edit":
            print("Enter ID:");
            state = "edit_id";
            break;

        case "delete":
            print("Enter ID:");
            state = "delete";
            break;

        default:

            if (state === "history") {
                let res = Module.ccall("get_history","string",
                ["number"], [input]);
                print(res);
                state = "";
            }

            else if (state === "delete") {
                let res = Module.ccall("delete_patient","string",
                ["number"], [input]);
                print(res);
                state = "";
            }

            else {
                print("❌ Unknown command");
            }
    }
}

</script>

</body>
</html>
