<!DOCTYPE html>
<html>
<head>
<title>Clinic Register</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

/* Header */
.header {
    text-align: center;
    padding: 20px;
    color: white;
    font-size: 28px;
    font-weight: bold;
}

/* Layout */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* Cards */
.card {
    background: white;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* Inputs */
input {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Buttons */
button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    background: #4facfe;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #007bff;
}

/* Output */
#output {
    background: #111;
    color: #0f0;
    padding: 15px;
    border-radius: 10px;
    min-height: 120px;
    white-space: pre-line;
}
</style>

</head>

<body>

<div class="header">🏥 Clinic Register Dashboard</div>

<div class="container">

<!-- Register -->
<div class="card">
<h3>➕ Register Patient</h3>
<input id="pid" placeholder="ID">
<input id="pname" placeholder="Name">
<input id="page" placeholder="Age">
<input id="pphone" placeholder="Phone">
<button onclick="registerPatient()">Register</button>
</div>

<!-- Visit -->
<div class="card">
<h3>🩺 Add Visit</h3>
<input id="vid" placeholder="Patient ID">
<input id="vdate" placeholder="DD-MM-YYYY">
<input id="vdiag" placeholder="Diagnosis">
<input id="vpres" placeholder="Prescription">
<button onclick="addVisit()">Add Visit</button>
</div>

<!-- History -->
<div class="card">
<h3>📋 Patient History</h3>
<input id="sid" placeholder="Patient ID">
<button onclick="getHistory()">Show</button>
</div>

<!-- Frequent -->
<div class="card">
<h3>⭐ Frequent Visitors</h3>
<input id="nvisits" placeholder="Enter N">
<button onclick="frequentVisitors()">Show</button>
</div>

<!-- Monthly -->
<div class="card">
<h3>📅 Monthly Visits</h3>
<input id="month" placeholder="MM">
<button onclick="monthlyVisits()">Show</button>
</div>

<!-- Edit -->
<div class="card">
<h3>✏️ Edit Patient</h3>
<input id="eid" placeholder="Patient ID">
<input id="ename" placeholder="New Name">
<input id="eage" placeholder="New Age">
<input id="ephone" placeholder="New Phone">
<button onclick="editPatient()">Update</button>
</div>

<!-- Delete -->
<div class="card">
<h3>❌ Delete Patient</h3>
<input id="did" placeholder="Patient ID">
<button onclick="deletePatient()">Delete</button>
</div>

<!-- Output -->
<div class="card">
<h3>💻 Output</h3>
<div id="output"></div>
</div>

</div>

<!-- WASM -->
<script>
var Module = {};
let ModuleReady = false;

Module.onRuntimeInitialized = function() {
    ModuleReady = true;
};
</script>

<script src="clinic.js"></script>

<script>
function registerPatient() {
    if (!ModuleReady) return alert("WASM not loaded");

    output.innerText = Module.ccall("register_patient","string",
    ["number","string","number","string"],
    [pid.value,pname.value,page.value,pphone.value]);
}

function addVisit() {
    output.innerText = Module.ccall("add_visit","string",
    ["number","string","string","string"],
    [vid.value,vdate.value,vdiag.value,vpres.value]);
}

function getHistory() {
    output.innerText = Module.ccall("get_history","string",
    ["number"],[sid.value]);
}

function frequentVisitors() {
    output.innerText = Module.ccall("frequent_visitors","string",
    ["number"],[nvisits.value]);
}

function monthlyVisits() {
    output.innerText = Module.ccall("visits_this_month","string",
    ["string"],[month.value]);
}

function editPatient() {
    output.innerText = Module.ccall("edit_patient","string",
    ["number","string","number","string"],
    [eid.value,ename.value,eage.value,ephone.value]);
}

function deletePatient() {
    output.innerText = Module.ccall("delete_patient","string",
    ["number"],[did.value]);
}
</script>

</body>
</html>
