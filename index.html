<!DOCTYPE html>
<html>
<head>
<title>Clinic Terminal</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: radial-gradient(circle, #020617, #000);
    color: #00ff9f;
}

/* Container */
.container {
    max-width: 900px;
    margin: 40px auto;
}

/* Title */
.title {
    font-size: 28px;
    text-align: center;
    margin-bottom: 20px;
}

/* Terminal */
.terminal {
    background: #020617;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 0 20px #00ff9f33;
}

/* Output */
#output {
    min-height: 300px;
    white-space: pre-line;
    margin-bottom: 10px;
}

/* Input */
.input-line {
    display: flex;
}

.input-line span {
    margin-right: 5px;
}

input {
    flex: 1;
    background: transparent;
    border: none;
    color: #00ff9f;
    outline: none;
}

/* Buttons */
.commands {
    margin-top: 15px;
}

button {
    margin: 5px;
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    background: #00ff9f22;
    color: #00ff9f;
    cursor: pointer;
}

button:hover {
    background: #00ff9f;
    color: black;
}
</style>

</head>

<body>

<div class="container">

<div class="title">🏥 Clinic Terminal</div>

<div class="terminal">

<div id="output">
Welcome to Clinic System

Commands:
register id name age phone
visit id date diagnosis prescription
history id
edit id name age phone
delete id
</div>

<div class="input-line">
<span>></span>
<input id="cmd" placeholder="Type command..." onkeydown="handleEnter(event)">
</div>

<div class="commands">
<button onclick="quick('register')">Register</button>
<button onclick="quick('visit')">Visit</button>
<button onclick="quick('history')">History</button>
<button onclick="quick('edit')">Edit</button>
<button onclick="quick('delete')">Delete</button>
</div>

</div>

</div>

<!-- WASM -->
<script>
var Module = {};
let ready = false;

Module.onRuntimeInitialized = function() {
    ready = true;
    print("✅ System Ready");
};
</script>

<script src="clinic.js"></script>

<script>

// Print to terminal
function print(text) {
    output.innerText += "\n" + text;
}

// Enter key
function handleEnter(e) {
    if (e.key === "Enter") {
        runCommand(cmd.value);
        cmd.value = "";
    }
}

// Quick buttons
function quick(type) {
    cmd.value = type + " ";
    cmd.focus();
}

// Main command handler
function runCommand(input) {

    if (!ready) {
        print("⚠️ System not ready");
        return;
    }

    let parts = input.split(" ");
    let command = parts[0];

    let result = "";

    switch(command) {

        case "register":
            result = Module.ccall("register_patient","string",
            ["number","string","number","string"],
            [parts[1], parts[2], parts[3], parts[4]]);
            break;

        case "visit":
            result = Module.ccall("add_visit","string",
            ["number","string","string","string"],
            [parts[1], parts[2], parts[3], parts[4]]);
            break;

        case "history":
            result = Module.ccall("get_history","string",
            ["number"], [parts[1]]);
            break;

        case "edit":
            let age = parts[3] ? parseInt(parts[3]) : 0;
            result = Module.ccall("edit_patient","string",
            ["number","string","number","string"],
            [parts[1], parts[2] || "", age, parts[4] || ""]);
            break;

        case "delete":
            result = Module.ccall("delete_patient","string",
            ["number"], [parts[1]]);
            break;

        default:
            result = "❌ Unknown command";
    }

    print("> " + input);
    print(result);
}

</script>

</body>
</html>
