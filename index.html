<!DOCTYPE html>
<html>
<head>
<title>Clinic Register</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #1e293b;
    color: white;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
}

.sidebar button {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background: #334155;
    border: none;
    color: white;
    cursor: pointer;
}

.sidebar button:hover {
    background: #475569;
}

/* Main */
.main {
    flex: 1;
    background: #f1f5f9;
    padding: 20px;
}

/* Cards */
.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    display: none;
}

/* Active */
.active {
    display: block;
}

/* Inputs */
input {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
}

/* Buttons */
.action-btn {
    width: 100%;
    padding: 10px;
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
}

/* Output */
#output {
    background: black;
    color: #00ff00;
    padding: 10px;
    min-height: 150px;
    white-space: pre-line;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
<h2>🏥 Clinic</h2>
<button onclick="show('register')">Register</button>
<button onclick="show('visit')">Add Visit</button>
<button onclick="show('history')">History</button>
<button onclick="show('report')">Reports</button>
<button onclick="show('edit')">Edit</button>
<button onclick="show('delete')">Delete</button>
</div>

<!-- Main -->
<div class="main">

<!-- Register -->
<div id="register" class="card active">
<h3>Register Patient</h3>
<input id="pid" placeholder="ID">
<input id="pname" placeholder="Name">
<input id="page" placeholder="Age">
<input id="pphone" placeholder="Phone">
<button class="action-btn" onclick="registerPatient()">Submit</button>
</div>

<!-- Visit -->
<div id="visit" class="card">
<h3>Add Visit</h3>
<input id="vid" placeholder="Patient ID">
<input id="vdate" placeholder="DD-MM-YYYY">
<input id="vdiag" placeholder="Diagnosis">
<input id="vpres" placeholder="Prescription">
<button class="action-btn" onclick="addVisit()">Submit</button>
</div>

<!-- History -->
<div id="history" class="card">
<h3>Patient History</h3>
<input id="sid" placeholder="Patient ID">
<button class="action-btn" onclick="getHistory()">Show</button>
</div>

<!-- Reports -->
<div id="report" class="card">
<h3>Reports</h3>
<input id="nvisits" placeholder="Frequent N">
<button class="action-btn" onclick="frequentVisitors()">Frequent</button>
<input id="month" placeholder="MM">
<button class="action-btn" onclick="monthlyVisits()">Monthly</button>
</div>

<!-- Edit -->
<div id="edit" class="card">
<h3>Edit Patient</h3>
<input id="eid" placeholder="ID">
<input id="ename" placeholder="New Name">
<input id="eage" placeholder="Age">
<input id="ephone" placeholder="Phone">
<button class="action-btn" onclick="editPatient()">Update</button>
</div>

<!-- Delete -->
<div id="delete" class="card">
<h3>Delete Patient</h3>
<input id="did" placeholder="ID">
<button class="action-btn" onclick="deletePatient()">Delete</button>
</div>

<!-- Output -->
<div class="card active">
<h3>System Output</h3>
<div id="output"></div>
</div>

</div>

<!-- WASM -->
<script>
var Module = {};
Module.onRuntimeInitialized = () => console.log("WASM Ready");
</script>

<script src="clinic.js"></script>

<script>
// Switch UI
function show(id) {
    document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// Functions
function registerPatient() {
    output.innerText = Module.ccall("register_patient","string",
    ["number","string","number","string"],
    [pid.value,pname.value,page.value,pphone.value]);
}

function addVisit() {
    output.innerText = Module.ccall("add_visit","string",
    ["number","string","string","string"],
    [vid.value,vdate.value,vdiag.value,vpres.value]);
}

function getHistory() {
    output.innerText = Module.ccall("get_history","string",
    ["number"],[sid.value]);
}

function frequentVisitors() {
    output.innerText = Module.ccall("frequent_visitors","string",
    ["number"],[nvisits.value]);
}

function monthlyVisits() {
    output.innerText = Module.ccall("visits_this_month","string",
    ["string"],[month.value]);
}

function editPatient() {
    output.innerText = Module.ccall("edit_patient","string",
    ["number","string","number","string"],
    [eid.value,ename.value,eage.value,ephone.value]);
}

function deletePatient() {
    output.innerText = Module.ccall("delete_patient","string",
    ["number"],[did.value]);
}
</script>

</body>
</html>
