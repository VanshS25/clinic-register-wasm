<script>

var Module = {};
let ready = false;

Module.onRuntimeInitialized = function() {
    ready = true;
    print("✅ System Ready");
};

// Terminal print
function print(text) {
    output.innerText += "\n" + text;
}

// State machine
let state = "";
let tempData = {};

// Enter key
function handleEnter(e) {
    if (e.key === "Enter") {
        processInput(cmd.value);
        cmd.value = "";
    }
}

// Main logic
function processInput(input) {

    if (!ready) {
        print("⚠️ System not ready");
        return;
    }

    // STEP FLOW
    switch(state) {

        // -------- REGISTER FLOW --------
        case "reg_id":
            tempData.id = input;
            print("Enter Name:");
            state = "reg_name";
            return;

        case "reg_name":
            tempData.name = input;
            print("Enter Age:");
            state = "reg_age";
            return;

        case "reg_age":
            tempData.age = input;
            print("Enter Phone:");
            state = "reg_phone";
            return;

        case "reg_phone":
            tempData.phone = input;

            let res = Module.ccall("register_patient","string",
            ["number","string","number","string"],
            [tempData.id, tempData.name, tempData.age, tempData.phone]);

            print(res);
            state = "";
            return;

        // -------- VISIT FLOW --------
        case "visit_id":
            tempData.id = input;
            print("Enter Date:");
            state = "visit_date";
            return;

        case "visit_date":
            tempData.date = input;
            print("Enter Diagnosis:");
            state = "visit_diag";
            return;

        case "visit_diag":
            tempData.diag = input;
            print("Enter Prescription:");
            state = "visit_pres";
            return;

        case "visit_pres":
            tempData.pres = input;

            let res2 = Module.ccall("add_visit","string",
            ["number","string","string","string"],
            [tempData.id, tempData.date, tempData.diag, tempData.pres]);

            print(res2);
            state = "";
            return;

        // -------- EDIT FLOW --------
        case "edit_id":
            tempData.id = input;
            print("Enter Name (or press Enter to skip):");
            state = "edit_name";
            return;

        case "edit_name":
            tempData.name = input;
            print("Enter Age (or press Enter to skip):");
            state = "edit_age";
            return;

        case "edit_age":
            tempData.age = input ? parseInt(input) : 0;
            print("Enter Phone (or press Enter to skip):");
            state = "edit_phone";
            return;

        case "edit_phone":
            tempData.phone = input;

            let res3 = Module.ccall("edit_patient","string",
            ["number","string","number","string"],
            [tempData.id, tempData.name || "", tempData.age, tempData.phone || ""]);

            print(res3);
            state = "";
            return;
    }

    // -------- COMMANDS --------
    switch(input.toLowerCase()) {

        case "register":
            print("Enter ID:");
            state = "reg_id";
            break;

        case "visit":
            print("Enter Patient ID:");
            state = "visit_id";
            break;

        case "history":
            print("Enter ID:");
            state = "history";
            break;

        case "edit":
            print("Enter ID:");
            state = "edit_id";
            break;

        case "delete":
            print("Enter ID:");
            state = "delete";
            break;

        default:

            if (state === "history") {
                let res = Module.ccall("get_history","string",
                ["number"], [input]);
                print(res);
                state = "";
            }

            else if (state === "delete") {
                let res = Module.ccall("delete_patient","string",
                ["number"], [input]);
                print(res);
                state = "";
            }

            else {
                print("❌ Unknown command");
            }
    }
}

</script>
