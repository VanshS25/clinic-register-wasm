<!DOCTYPE html>
<html>
<head>
<title>Clinic Register</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
}

/* Sidebar */
.sidebar {
    width: 230px;
    background: linear-gradient(180deg, #1e3a8a, #2563eb);
    color: white;
    height: 100vh;
    padding: 20px;
    box-shadow: 4px 0 15px rgba(0,0,0,0.2);
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
}

.sidebar button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.sidebar button:hover {
    background: white;
    color: #2563eb;
    transform: scale(1.05);
}

/* Main */
.main {
    flex: 1;
    padding: 25px;
}

/* Card */
.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    display: none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.active {
    display: block;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 5px rgba(37,99,235,0.4);
    outline: none;
}

/* Buttons */
.submit-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.submit-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 4px 12px rgba(37,99,235,0.4);
}

/* Output */
#output {
    background: #020617;
    color: #22c55e;
    padding: 15px;
    margin-top: 20px;
    border-radius: 12px;
    min-height: 150px;
    white-space: pre-line;
    font-family: monospace;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
<h2>🏥 Clinic Pro</h2>
<button onclick="show('register')">Register</button>
<button onclick="show('visit')">Add Visit</button>
<button onclick="show('history')">History</button>
<button onclick="show('report')">Reports</button>
<button onclick="show('edit')">Edit</button>
<button onclick="show('delete')">Delete</button>
</div>

<!-- Main -->
<div class="main">

<!-- Register -->
<div id="register" class="card active">
<h3>Register Patient</h3>
<input id="pid" placeholder="ID">
<input id="pname" placeholder="Name">
<input id="page" placeholder="Age">
<input id="pphone" placeholder="Phone">
<button class="submit-btn" onclick="registerPatient()">Submit</button>
</div>

<!-- Visit -->
<div id="visit" class="card">
<h3>Add Visit</h3>
<input id="vid" placeholder="Patient ID">
<input id="vdate" placeholder="DD-MM-YYYY">
<input id="vdiag" placeholder="Diagnosis">
<input id="vpres" placeholder="Prescription">
<button class="submit-btn" onclick="addVisit()">Submit</button>
</div>

<!-- History -->
<div id="history" class="card">
<h3>Patient History</h3>
<input id="sid" placeholder="Patient ID">
<button class="submit-btn" onclick="getHistory()">Show</button>
</div>

<!-- Reports -->
<div id="report" class="card">
<h3>Reports</h3>
<input id="nvisits" placeholder="Frequent N">
<button class="submit-btn" onclick="frequentVisitors()">Frequent</button>

<input id="month" placeholder="MM">
<button class="submit-btn" onclick="monthlyVisits()">Monthly</button>
</div>

<!-- Edit -->
<div id="edit" class="card">
<h3>Edit Patient</h3>
<input id="eid" placeholder="Enter ID" onblur="autoFill()">
<input id="ename" placeholder="Name">
<input id="eage" placeholder="Age">
<input id="ephone" placeholder="Phone">
<button class="submit-btn" onclick="editPatient()">Update</button>
</div>

<!-- Delete -->
<div id="delete" class="card">
<h3>Delete Patient</h3>
<input id="did" placeholder="ID">
<button class="submit-btn" onclick="deletePatient()">Delete</button>
</div>

<!-- Output -->
<div id="output">⚡ Loading system...</div>

</div>

<!-- WASM -->
<script>
var Module = {};
let ready = false;

Module.onRuntimeInitialized = function() {
    ready = true;
    output.innerText = "✅ System Ready";
};
</script>

<script src="clinic.js"></script>

<script>

// Navigation
function show(id) {
    document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// Check
function check() {
    if (!ready) {
        alert("WASM not ready");
        return false;
    }
    return true;
}

// Autofill
function autoFill() {
    if (!check()) return;

    let id = parseInt(eid.value);
    if (!id) return;

    let result = Module.ccall("get_patient","string",["number"],[id]);

    if (result === "NOT_FOUND") {
        alert("Patient not found");
        return;
    }

    let data = result.split(",");
    ename.value = data[0];
    eage.value = data[1];
    ephone.value = data[2];
}

// Functions
function registerPatient() {
    if (!check()) return;
    output.innerText = Module.ccall("register_patient","string",
    ["number","string","number","string"],
    [pid.value,pname.value,page.value,pphone.value]);
}

function addVisit() {
    if (!check()) return;
    output.innerText = Module.ccall("add_visit","string",
    ["number","string","string","string"],
    [vid.value,vdate.value,vdiag.value,vpres.value]);
}

function getHistory() {
    if (!check()) return;
    output.innerText = Module.ccall("get_history","string",
    ["number"],[sid.value]);
}

function frequentVisitors() {
    if (!check()) return;
    output.innerText = Module.ccall("frequent_visitors","string",
    ["number"],[nvisits.value]);
}

function monthlyVisits() {
    if (!check()) return;
    output.innerText = Module.ccall("visits_this_month","string",
    ["string"],[month.value]);
}

function editPatient() {
    if (!check()) return;

    let ageVal = eage.value === "" ? 0 : parseInt(eage.value);

    output.innerText = Module.ccall("edit_patient","string",
    ["number","string","number","string"],
    [eid.value,ename.value,ageVal,ephone.value]);
}

function deletePatient() {
    if (!check()) return;
    output.innerText = Module.ccall("delete_patient","string",
    ["number"],[did.value]);
}

</script>

</body>
</html>
