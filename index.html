<!DOCTYPE html>
<html>
<head>
<title>Clinic Register</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
    margin: 0;
}

/* Header */
.header {
    background: #2563eb;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

/* Container */
.container {
    max-width: 800px;
    margin: 20px auto;
}

/* Card */
.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Buttons */
button {
    width: 100%;
    padding: 10px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 8px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

/* Output */
#output {
    background: black;
    color: #00ff00;
    padding: 12px;
    border-radius: 8px;
    min-height: 120px;
    white-space: pre-line;
}
</style>

</head>

<body>

<div class="header">🏥 Clinic Register System</div>

<div class="container">

<!-- Register -->
<div class="card">
<h3>Register Patient</h3>
<input id="pid" placeholder="ID">
<input id="pname" placeholder="Name">
<input id="page" placeholder="Age">
<input id="pphone" placeholder="Phone">
<button onclick="registerPatient()">Register</button>
</div>

<!-- Visit -->
<div class="card">
<h3>Add Visit</h3>
<input id="vid" placeholder="Patient ID">
<input id="vdate" placeholder="DD-MM-YYYY">
<input id="vdiag" placeholder="Diagnosis">
<input id="vpres" placeholder="Prescription">
<button onclick="addVisit()">Add Visit</button>
</div>

<!-- History -->
<div class="card">
<h3>View History</h3>
<input id="sid" placeholder="Patient ID">
<button onclick="getHistory()">Show</button>
</div>

<!-- Edit -->
<div class="card">
<h3>Edit Patient</h3>
<input id="eid" placeholder="ID">
<input id="ename" placeholder="New Name">
<input id="eage" placeholder="Age">
<input id="ephone" placeholder="Phone">
<button onclick="editPatient()">Update</button>
</div>

<!-- Delete -->
<div class="card">
<h3>Delete Patient</h3>
<input id="did" placeholder="ID">
<button onclick="deletePatient()">Delete</button>
</div>

<!-- Output -->
<div class="card">
<h3>Output</h3>
<div id="output">Waiting for input...</div>
</div>

</div>

<!-- WASM FIX -->
<script>
var Module = {};
let ready = false;

Module.onRuntimeInitialized = function() {
    ready = true;
    document.getElementById("output").innerText = "✅ System Ready";
};
</script>

<script src="clinic.js"></script>

<script>

function checkReady() {
    if (!ready) {
        alert("⚠️ WebAssembly not loaded yet!");
        return false;
    }
    return true;
}

function registerPatient() {
    if (!checkReady()) return;

    let result = Module.ccall("register_patient","string",
    ["number","string","number","string"],
    [pid.value,pname.value,page.value,pphone.value]);

    output.innerText = result;
}

function addVisit() {
    if (!checkReady()) return;

    let result = Module.ccall("add_visit","string",
    ["number","string","string","string"],
    [vid.value,vdate.value,vdiag.value,vpres.value]);

    output.innerText = result;
}

function getHistory() {
    if (!checkReady()) return;

    let result = Module.ccall("get_history","string",
    ["number"],[sid.value]);

    output.innerText = result;
}

function editPatient() {
    if (!checkReady()) return;

    let result = Module.ccall("edit_patient","string",
    ["number","string","number","string"],
    [eid.value,ename.value,eage.value,ephone.value]);

    output.innerText = result;
}

function deletePatient() {
    if (!checkReady()) return;

    let result = Module.ccall("delete_patient","string",
    ["number"],[did.value]);

    output.innerText = result;
}

</script>

</body>
</html>
