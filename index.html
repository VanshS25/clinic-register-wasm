<!DOCTYPE html>
<html>
<head>
<title>Clinic Analyzer</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: #020617;
    color: #00ffcc;
}

/* GRID BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(#00ffcc11 1px, transparent 1px),
                      linear-gradient(90deg, #00ffcc11 1px, transparent 1px);
    background-size: 40px 40px;
    animation: move 10s linear infinite;
}

@keyframes move {
    from { transform: translate(0,0); }
    to { transform: translate(40px,40px); }
}

/* Header */
.header {
    margin: 20px auto;
    max-width: 900px;
    padding: 15px;
    border-radius: 12px;
    background: #020617;
    box-shadow: 0 0 15px #00ffcc33;
    display: flex;
    justify-content: space-between;
}

.status {
    color: #22c55e;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.4; }
}

/* Container */
.container {
    max-width: 900px;
    margin: auto;
}

/* Terminal */
.terminal {
    background: #020617;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 0 25px #00ffcc22;
}

/* Output */
#output {
    min-height: 300px;
    max-height: 350px;
    overflow-y: auto;
    white-space: pre-line;
}

/* Input */
.input-box {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

input {
    flex: 1;
    background: black;
    border: none;
    color: #00ffcc;
    padding: 10px;
    border-radius: 8px;
    outline: none;
}

/* Button */
button {
    background: #00ffcc;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

/* Quick buttons */
.quick button {
    margin: 5px;
    background: #00ffcc22;
    color: #00ffcc;
}

.quick button:hover {
    background: #00ffcc;
    color: black;
}
</style>

</head>

<body>

<div class="header">
    <div>🏥 Clinic Analyzer</div>
    <div class="status">● WASM Live</div>
</div>

<div class="container">

<div class="terminal">

<div id="output">
[+] System Initialized
Type: register, visit, history, edit, delete
</div>

<div class="input-box">
<input id="cmd" placeholder="Type command..." onkeydown="handleKey(event)">
<button onclick="send()">Send</button>
</div>

<div class="quick">
<button onclick="quick('register')">Register</button>
<button onclick="quick('visit')">Visit</button>
<button onclick="quick('history')">History</button>
<button onclick="quick('edit')">Edit</button>
<button onclick="quick('delete')">Delete</button>
</div>

</div>

</div>

<!-- WASM FIX -->
<script>
var ready = false;

var Module = {
    locateFile: function(path) {
        if (path.endsWith(".wasm")) return "clinic.wasm";
        return path;
    },
    onRuntimeInitialized: function() {
        ready = true;
        print("✅ WASM Loaded");
    }
};
</script>

<script src="clinic.js"></script>

<script>

let history = [];
let index = -1;

function print(text) {
    let out = document.getElementById("output");
    out.innerText += "\n" + text;
    out.scrollTop = out.scrollHeight;
}

function send() {
    let input = cmd.value.trim();
    if (!input) return;

    history.push(input);
    index = history.length;

    cmd.value = "";
    process(input);
}

function handleKey(e) {

    if (e.key === "Enter") send();

    // ⬆️ History
    if (e.key === "ArrowUp") {
        if (index > 0) index--;
        cmd.value = history[index] || "";
    }

    if (e.key === "ArrowDown") {
        if (index < history.length - 1) index++;
        cmd.value = history[index] || "";
    }
}

function quick(x) {
    cmd.value = x;
    cmd.focus();
}

// STATE
let state = "";
let temp = {};

function process(input) {

    if (!ready) {
        print("⚠️ System not ready");
        return;
    }

    // 🔥 SHOW USER INPUT
    print("> " + input);

    // -------- REGISTER --------
    if (input === "register") {
        print("Enter ID:");
        state = "id";
        return;
    }

    if (state === "id") {
        temp.id = input;
        print("Enter Name:");
        state = "name";
        return;
    }

    if (state === "name") {
        temp.name = input;
        print("Enter Age:");
        state = "age";
        return;
    }

    if (state === "age") {
        temp.age = input;
        print("Enter Phone:");
        state = "phone";
        return;
    }

    if (state === "phone") {
        temp.phone = input;

        let res = Module.ccall("register_patient","string",
        ["number","string","number","string"],
        [temp.id,temp.name,temp.age,temp.phone]);

        print(res);
        state = "";
        return;
    }

    // -------- HISTORY --------
    if (input === "history") {
        print("Enter ID:");
        state = "history";
        return;
    }

    if (state === "history") {
        let res = Module.ccall("get_history","string",
        ["number"],[input]);
        print(res);
        state = "";
        return;
    }

    // -------- DELETE --------
    if (input === "delete") {
        print("Enter ID:");
        state = "delete";
        return;
    }

    if (state === "delete") {
        let res = Module.ccall("delete_patient","string",
        ["number"],[input]);
        print(res);
        state = "";
        return;
    }

    print("❌ Unknown command");
}

</script>

</body>
</html>
